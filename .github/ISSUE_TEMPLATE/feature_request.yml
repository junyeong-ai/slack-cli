name: Feature request
description: Suggest an enhancement
title: "[feat] "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Which user pain point or workflow gap does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the CLI surface, configuration, or output format you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Compatibility impact
      description: Does this break existing flags, output, cache schema, or config?
