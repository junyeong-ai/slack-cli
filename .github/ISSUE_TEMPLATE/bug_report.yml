name: Bug report
description: Report a defect in slack-cli
title: "[bug] "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please complete the fields below so the
        issue can be reproduced and triaged quickly.
  - type: input
    id: version
    attributes:
      label: slack-cli version
      description: Output of `slack-cli --version`.
      placeholder: "0.3.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x86_64 (gnu)
        - Linux x86_64 (musl)
        - Linux aarch64 (gnu)
        - Linux aarch64 (musl)
        - macOS Apple Silicon
        - macOS Intel
        - Windows x86_64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal commands or scenarios that trigger the bug.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include `RUST_LOG=debug` output if relevant.
      render: shell
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Sanitised `~/.config/slack-cli/config.toml` excerpt, if applicable. Redact tokens.
      render: toml
