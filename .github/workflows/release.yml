name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}
          cache: false

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_CROSS: ${{ matrix.cross }}
        run: |
          set -euo pipefail
          if [ "$MATRIX_CROSS" = "true" ]; then
            cross build --release --locked --target "$MATRIX_TARGET"
          else
            toolchain="$(rustup show active-toolchain | awk '{print $1}')"
            CARGO="$(rustup which --toolchain "$toolchain" cargo)"
            RUSTC="$(rustup which --toolchain "$toolchain" rustc)"
            export CARGO RUSTC
            "$CARGO" build --release --locked --target "$MATRIX_TARGET"
          fi

      - name: Package binary
        id: package
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_OS: ${{ matrix.os }}
          GH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          version="${GH_REF#refs/tags/v}"
          target="$MATRIX_TARGET"
          stem="slack-cli-v${version}-${target}"

          mkdir -p staging
          if [ "$MATRIX_OS" = "windows-latest" ]; then
            cp "target/${target}/release/slack-cli.exe" staging/slack-cli.exe
            archive="${stem}.zip"
            (cd staging && 7z a "../${archive}" slack-cli.exe >/dev/null)
          else
            cp "target/${target}/release/slack-cli" staging/slack-cli
            archive="${stem}.tar.gz"
            tar -C staging -czf "${archive}" slack-cli
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi

          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  hashes:
    name: Aggregate hashes
    needs: build
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.collect.outputs.hashes }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Compute base64 SHA256 subjects
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          hashes=$(
            find . -maxdepth 1 -type f ! -name '*.sha256' -printf '%f\n' \
              | sort \
              | xargs -r sha256sum \
              | base64 -w0
          )
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA provenance
    needs: hashes
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.hashes.outputs.hashes }}
      provenance-name: slack-cli.intoto.jsonl
      upload-assets: false

  release:
    name: Publish release
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Download SLSA provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          name: ${{ needs.provenance.outputs.provenance-name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifacts (sigstore keyless)
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          for f in *; do
            case "$f" in
              *.sha256|*.bundle|*.intoto.jsonl) continue ;;
            esac
            cosign sign-blob --yes \
              --bundle "${f}.bundle" \
              "$f"
          done

      - name: Mirror per-tag assets to "latest" alias
        shell: bash
        env:
          GH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          version="${GH_REF#refs/tags/v}"
          prefix="slack-cli-v${version}-"
          cd dist
          shopt -s nullglob
          for f in "${prefix}"*; do
            suffix="${f#"${prefix}"}"
            cp "$f" "slack-cli-${suffix}"
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
