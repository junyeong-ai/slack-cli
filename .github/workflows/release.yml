name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.95.0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@cross

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary
        shell: bash
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          target="${{ matrix.target }}"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            binary="target/$target/release/slack-cli.exe"
            archive="slack-cli-v${version}-${target}.zip"
            latest_archive="slack-cli-${target}.zip"
            cp "$binary" slack-cli.exe
            7z a "$archive" slack-cli.exe
          else
            binary="target/$target/release/slack-cli"
            archive="slack-cli-v${version}-${target}.tar.gz"
            latest_archive="slack-cli-${target}.tar.gz"
            cp "$binary" slack-cli
            tar -czf "$archive" slack-cli
          fi

          cp "$archive" "$latest_archive"

      - name: Generate checksum
        shell: bash
        run: |
          for asset in slack-cli-v*-${{ matrix.target }}.* slack-cli-${{ matrix.target }}.*; do
            case "$asset" in
              *.sha256) continue ;;
            esac

            if command -v sha256sum >/dev/null; then
              sha256sum "$asset" > "$asset.sha256"
            elif command -v shasum >/dev/null; then
              shasum -a 256 "$asset" > "$asset.sha256"
            else
              echo "No checksum tool found" >&2
              exit 1
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            slack-cli-v*-${{ matrix.target }}.*
            slack-cli-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release
          find artifacts -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
